<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valmu Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/modals.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-brand-card">
                <div class="sidebar-header">
                    <img src="assets/logo.png" alt="Valmu Logo" class="brand-logo">
                    <div class="brand-copy">
                        <span class="brand-overline">Valmu Ecosystem</span>
                        <h2 class="brand-name">Admin</h2>
                    </div>
                </div>
                <p class="sidebar-brand-text">Operacion diaria, inventario y control comercial en un solo lugar.</p>
            </div>

            <nav class="sidebar-nav">
                <span class="sidebar-section-label">General</span>
                <a href="#" class="nav-item active" data-page="dashboard">
                    <span class="nav-icon-badge" aria-hidden="true"><i class="bi bi-grid-1x2-fill"></i></span>
                    <span class="nav-label">Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-page="users">
                    <span class="nav-icon-badge" aria-hidden="true"><i class="bi bi-people-fill"></i></span>
                    <span class="nav-label">Usuarios</span>
                </a>
                <a href="#" class="nav-item" data-page="customers">
                    <span class="nav-icon-badge" aria-hidden="true"><i class="bi bi-person-heart"></i></span>
                    <span class="nav-label">Clientes</span>
                </a>
                <span class="sidebar-section-label">Catalogo</span>
                <a href="#" class="nav-item" data-page="products">
                    <span class="nav-icon-badge" aria-hidden="true"><i class="bi bi-box-seam-fill"></i></span>
                    <span class="nav-label">Productos</span>
                </a>
                <a href="#" class="nav-item" data-page="categories">
                    <span class="nav-icon-badge" aria-hidden="true"><i class="bi bi-folder-fill"></i></span>
                    <span class="nav-label">Categorias</span>
                </a>
                <a href="#" class="nav-item" data-page="suppliers">
                    <span class="nav-icon-badge" aria-hidden="true"><i class="bi bi-building"></i></span>
                    <span class="nav-label">Proveedores</span>
                </a>
                <span class="sidebar-section-label">Operacion</span>
                <a href="#" class="nav-item" data-page="wastage">
                    <span class="nav-icon-badge" aria-hidden="true"><i class="bi bi-recycle"></i></span>
                    <span class="nav-label">Mermas</span>
                </a>
                <a href="#" class="nav-item" data-page="finances">
                    <span class="nav-icon-badge" aria-hidden="true"><i class="bi bi-coin"></i></span>
                    <span class="nav-label">Finanzas</span>
                </a>
                <a href="#" class="nav-item" data-page="invoicing">
                    <span class="nav-icon-badge" aria-hidden="true"><i class="bi bi-receipt"></i></span>
                    <span class="nav-label">Facturacion</span>
                </a>
                <a href="#" class="nav-item" data-page="logistics">
                    <span class="nav-icon-badge" aria-hidden="true"><i class="bi bi-truck"></i></span>
                    <span class="nav-label">Logistica</span>
                </a>
                <a href="#" class="nav-item" data-page="branches">
                    <span class="nav-icon-badge" aria-hidden="true"><i class="bi bi-geo-alt-fill"></i></span>
                    <span class="nav-label">Sucursales</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="#" class="sidebar-settings-link" data-page="settings">
                    <span class="nav-icon-badge" aria-hidden="true"><i class="bi bi-gear-fill"></i></span>
                    <span class="nav-label">Configuracion</span>
                </a>
                <button class="btn-logout">Cerrar sesion</button>
                <div class="sidebar-meta-text" id="sidebar-app-version">v-</div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h1 id="page-title">Dashboard</h1>
                <div class="top-header-actions">
                    <button class="window-action-btn" id="toggle-fullscreen-btn" type="button">Pantalla completa</button>
                    <div class="user-profile">
                        <span class="user-name">Administrador</span>
                        <div class="user-avatar">AD</div>
                    </div>
                </div>
            </header>

            <section id="app-update-banner" class="app-update-banner hidden" aria-live="polite"></section>

            <section id="content-area" class="content-area">
                <div class="loader">Cargando...</div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/services/session.js"></script>
    <script src="js/services/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/views/dashboard.js"></script>
    <script src="js/views/categories.js"></script>
    <script src="js/views/suppliers.js"></script>
    <script src="js/views/products.js"></script>
    <script src="js/views/branches.js"></script>
    <script src="js/views/wastage.js"></script>
    <script src="js/views/users.js"></script>
    <script src="js/views/customers.js"></script>
    <script src="js/views/static-pages.js"></script>
    <script src="js/views/settings.js"></script>
    <script src="js/app/routes.js"></script>
    <script src="js/app/navigation.js"></script>
    <script src="js/renderer.js"></script>
</body>

</html>
